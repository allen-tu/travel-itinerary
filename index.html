  <link

  />
  <style>
    :root {
      color-scheme: light;
      --ink: #20252a;
      --muted: #637078;
      --paper: #fbfaf7;
      --surface: #ffffff;
      --line: #dfd6c8;
      --accent: #184a59;
      --gold: #a77a3b;
      --sage: #71816d;
      --terracotta: #b36a4c;
      --blue: #396f8f;
      --plum: #6f5878;
      --radius: 8px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      color: var(--ink);
      background: var(--paper);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", sans-serif;
      letter-spacing: 0;
    }

    a { color: var(--accent); }

    .app {
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto auto 1fr;
    }

    header {
      padding: 20px 18px 14px;
      background: linear-gradient(180deg, #fffaf0 0%, #fbfaf7 100%);
      border-bottom: 1px solid var(--line);
    }

    .kicker {
      margin: 0 0 6px;
      color: var(--gold);
      font-size: 12px;
      font-weight: 750;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      color: var(--accent);
      font-size: clamp(26px, 7vw, 42px);
      line-height: 1.05;
    }

    .subtitle {
      max-width: 920px;
      margin: 10px 0 0;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.55;
    }

    .day-tabs {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding: 12px 12px;
      background: var(--surface);
      border-bottom: 1px solid var(--line);
      scrollbar-width: thin;
    }

    .day-tab {
      min-width: 112px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
      color: var(--ink);
      padding: 10px 11px;
      text-align: left;
      cursor: pointer;
    }

    .day-tab:focus-visible {
      outline: 3px solid rgba(24, 74, 89, 0.25);
      outline-offset: 2px;
    }

    .day-tab strong {
      display: block;
      font-size: 13px;
      line-height: 1.2;
    }

    .day-tab span {
      display: block;
      margin-top: 3px;
      color: var(--muted);
      font-size: 11px;
      line-height: 1.25;
    }

    .day-tab[aria-selected="true"] {
      border-color: var(--accent);
      background: #edf5f4;
      box-shadow: inset 0 0 0 1px var(--accent);
    }

    main {
      display: grid;
      grid-template-columns: minmax(320px, 420px) 1fr;
      min-height: 0;
    }

    .panel {
      min-height: 0;
      overflow: auto;
      background: var(--surface);
      border-right: 1px solid var(--line);
    }

    .panel-inner { padding: 16px; }

    .day-title {
      margin: 0 0 8px;
      font-size: 20px;
      color: var(--accent);
      line-height: 1.25;
    }

    .meta-grid {
      display: grid;
      gap: 8px;
      margin: 12px 0;
    }

    .meta {
      border: 1px solid #eadfce;
      border-radius: var(--radius);
      padding: 10px;
      background: #fffdf8;
    }

    .meta b {
      display: block;
      color: var(--gold);
      font-size: 12px;
      margin-bottom: 4px;
    }

    .meta span {
      color: var(--ink);
      font-size: 13px;
      line-height: 1.45;
    }

    .timeline {
      list-style: none;
      padding: 0;
      margin: 14px 0 0;
    }

    .stop {
      display: grid;
      grid-template-columns: 36px 1fr;
      gap: 10px;
      padding: 12px 0;
      border-top: 1px solid #eee7dc;
      cursor: pointer;
      border-radius: var(--radius);
      transition: background 160ms ease, box-shadow 160ms ease, transform 160ms ease;
    }

    .stop:hover {
      background: #fffaf0;
      box-shadow: inset 3px 0 0 var(--gold);
    }

    .stop:focus-visible {
      outline: 3px solid rgba(24, 74, 89, 0.25);
      outline-offset: 2px;
    }

    .stop.is-active {
      background: #edf5f4;
      box-shadow: inset 3px 0 0 var(--accent);
    }

    .num {
      width: 30px;
      height: 30px;
      display: inline-grid;
      place-items: center;
      border-radius: 50%;
      color: #fff;
      font-weight: 800;
      font-size: 13px;
      margin-top: 2px;
      pointer-events: none;
    }

    .stop h3 {
      margin: 0;
      font-size: 15px;
      line-height: 1.28;
    }

    .stop .en {
      display: block;
      margin-top: 2px;
      color: var(--muted);
      font-size: 12px;
    }

    .stop p {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 8px;
    }

    .chip {
      border: 1px solid #e3d8c8;
      border-radius: 999px;
      padding: 4px 8px;
      color: var(--ink);
      background: #fff;
      font-size: 12px;
    }

    .map-wrap {
      min-height: 0;
      position: relative;
      background: #e9eee8;
    }

    #map {
      position: absolute;
      inset: 0;
      min-height: 520px;
    }

    .map-note {
      position: absolute;
      left: 14px;
      bottom: 14px;
      z-index: 450;
      max-width: min(380px, calc(100% - 28px));
      border: 1px solid rgba(24, 74, 89, 0.2);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.94);
      padding: 10px 12px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
      backdrop-filter: blur(8px);
    }

    .leaflet-popup-content {
      margin: 12px 14px;
      min-width: 210px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", "PingFang TC", sans-serif;
    }

    .popup-title {
      margin: 0 0 3px;
      color: var(--accent);
      font-weight: 800;
      font-size: 15px;
    }

    .popup-line {
      margin: 4px 0 0;
      color: #4e5a61;
      font-size: 12px;
      line-height: 1.4;
    }

    .route-marker {
      width: 30px;
      height: 30px;
      display: grid;
      place-items: center;
      border: 2px solid #fff;
      border-radius: 50%;
      color: #fff;
      font-size: 13px;
      font-weight: 850;
      box-shadow: 0 2px 9px rgba(0, 0, 0, 0.28);
    }

    .alt-marker {
      width: 22px;
      height: 22px;
      display: grid;
      place-items: center;
      border: 2px solid #fff;
      border-radius: 50%;
      background: #6d7276;
      color: #fff;
      font-size: 11px;
      font-weight: 800;
      box-shadow: 0 2px 7px rgba(0, 0, 0, 0.24);
    }

    .extra-marker {
      width: 24px;
      height: 24px;
      display: grid;
      place-items: center;
      border: 2px solid #fff;
      border-radius: 50%;
      background: var(--gold);
      color: #fff;
      font-size: 11px;
      font-weight: 850;
      box-shadow: 0 2px 7px rgba(0, 0, 0, 0.24);
    }

    .legend {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 6px;
      margin-top: 10px;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 7px;
      color: var(--muted);
      font-size: 12px;
    }

    .swatch {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      border: 2px solid #fff;
      box-shadow: 0 0 0 1px #d7cbbd;
      flex: 0 0 auto;
    }

    @media (max-width: 840px) {
      .app { grid-template-rows: auto auto auto; }
      header { padding: 18px 15px 12px; }
      main {
        display: flex;
        flex-direction: column-reverse;
      }
      .panel {
        border-right: 0;
        border-top: 1px solid var(--line);
        max-height: none;
      }
      .map-wrap {
        height: 58vh;
        min-height: 420px;
      }
      #map { min-height: 420px; }
      .map-note { display: none; }
      .panel-inner { padding: 14px; }
      .day-tabs { padding: 10px; }
    }
  </style>
</head>

        map.invalidateSize({ animate: false });
        const day = days[activeDayIndex];
        if (!day) return;
        const points = day.route.map((stop) => [stop.lat, stop.lng]);
        const altPoints = day.alternatives.map((stop) => [stop.lat, stop.lng]);
        const extraPoints = (day.extras || []).map((stop) => [stop.lat, stop.lng]);
        const bounds = L.latLngBounds(points.concat(altPoints, extraPoints));
        map.fitBounds(bounds, { padding: [34, 34], maxZoom: 14 });

        iconSize: size,
        iconAnchor: [size[0] / 2, size[1] / 2],

        <p class="popup-line">${stop.en}</p>
        ${stop.address ? `<p class="popup-line">地址：${stop.address}</p>` : ""}
        ${stop.time ? `<p class="popup-line">時間：${stop.time}</p>` : ""}
        <p class="popup-line">${stop.note}</p>
      `;
    }

    function renderTabs(activeIndex) {
      tabs.innerHTML = "";
      days.forEach((day, index) => {
        const button = document.createElement("button");
        button.className = "day-tab";
        button.type = "button";
        button.setAttribute("aria-selected", index === activeIndex ? "true" : "false");
        button.innerHTML = `<strong>${day.city ? day.city + "｜" : ""}${day.label}｜${day.date}</strong><span>${day.title}</span>`;
        button.addEventListener("click", () => renderDay(index));
        tabs.appendChild(button);
      });
    }

    function renderDetails(day, color) {
      details.innerHTML = `
        <h2 class="day-title">${day.city ? day.city + "｜" : ""}${day.label}｜${day.date}<br>${day.title}</h2>
        <div class="meta-grid">
          <div class="meta"><b>步行負荷</b><span>${day.steps}</span></div>
          <div class="meta"><b>每日預算</b><span>${day.budget}</span></div>
          ${day.weather ? `<div class="meta"><b>天氣/體感</b><span>${day.weather}</span></div>` : ""}
          <div class="meta"><b>安全與交通</b><span>${day.safety}</span></div>
        </div>
        <div class="legend">
          <div class="legend-item"><span class="swatch" style="background:${color}"></span>當日主要停留點</div>
          <div class="legend-item"><span class="swatch" style="background:#6d7276"></span>餐廳/雨天備案</div>
          ${day.extras ? `<div class="legend-item"><span class="swatch" style="background:#a77a3b"></span>順路餐廳/伴手禮</div>` : ""}
        </div>
        <ol class="timeline">
          ${day.route.map((stop, index) => `
            <li class="stop" tabindex="0" role="button" data-stop-index="${index}" aria-label="在地圖上查看 ${stop.zh}">
              <span class="num" style="background:${color}">${index + 1}</span>
              <div>
                <h3>${stop.time}　${stop.zh}<span class="en">${stop.en}</span></h3>
                <p>${stop.note}</p>
                <div class="chips">
                  <span class="chip">${stop.address}</span>
                  <span class="chip">地圖編號 ${index + 1}</span>
                </div>
              </div>
            </li>
          `).join("")}
        </ol>
        ${day.extras ? `
          <div class="meta-grid">
            <div class="meta"><b>順路加標</b><span>${day.extras.map((stop) => `${stop.zh}：${stop.note}`).join("　／　")}</span></div>
          </div>
        ` : ""}
      `;
      details.querySelectorAll(".stop[data-stop-index]").forEach((item) => {
        const stopIndex = Number(item.dataset.stopIndex);
        item.addEventListener("click", () => focusStop(stopIndex));
        item.addEventListener("keydown", (event) => {
          if (event.key === "Enter" || event.key === " ") {
            event.preventDefault();
            focusStop(stopIndex);
          }
        });
      });
    }

    function setActiveStop(stopIndex) {
      details.querySelectorAll(".stop").forEach((item) => {
        item.classList.toggle("is-active", Number(item.dataset.stopIndex) === stopIndex);
      });
    }

    function focusStop(stopIndex) {
      const day = days[activeDayIndex];
      const stop = day?.route?.[stopIndex];
      const marker = activeRouteMarkers[stopIndex];
      if (!stop || !marker) return;
      setActiveStop(stopIndex);
      const targetZoom = Math.max(map.getZoom(), 15);
      map.flyTo([stop.lat, stop.lng], targetZoom, { duration: 0.65 });
      window.setTimeout(() => marker.openPopup(), 680);
    }

    function renderDay(index) {
      activeDayIndex = index;
      const day = days[index];
      const color = dayColors[index % dayColors.length];
      renderTabs(index);
      renderDetails(day, color);
      routeLayer.clearLayers();
      activeRouteMarkers = [];

      const points = day.route.map((stop) => [stop.lat, stop.lng]);
      L.polyline(points, {
        color,
        weight: 4,
        opacity: 0.82,
        lineJoin: "round"
      }).addTo(routeLayer);

      day.route.forEach((stop, stopIndex) => {
        const marker = L.marker([stop.lat, stop.lng], { icon: markerIcon(stopIndex + 1, color), zIndexOffset: 1000 })
          .bindPopup(popupHtml(stop))
          .addTo(routeLayer);
        marker.on("click", () => setActiveStop(stopIndex));
        activeRouteMarkers[stopIndex] = marker;
      });

      day.alternatives.forEach((stop) => {
        L.marker([stop.lat, stop.lng], { icon: markerIcon("備", "#6d7276", true), zIndexOffset: 100 })
          .bindPopup(popupHtml(stop, "備案："))
          .addTo(routeLayer);
      });

      (day.extras || []).forEach((stop) => {
        L.marker([stop.lat, stop.lng], {
          icon: L.divIcon({
            className: "",
            html: `<div class="extra-marker">順</div>`,
            iconSize: [24, 24],
            iconAnchor: [12, 12],
            popupAnchor: [0, -12]
          }),
          zIndexOffset: 500
        })
          .bindPopup(popupHtml(stop, "順路："))
          .addTo(routeLayer);
      });

      const altPoints = day.alternatives.map((stop) => [stop.lat, stop.lng]);
      const extraPoints = (day.extras || []).map((stop) => [stop.lat, stop.lng]);
      const bounds = L.latLngBounds(points.concat(altPoints, extraPoints));
      map.fitBounds(bounds, { padding: [34, 34], maxZoom: 14 });
      refreshMapSize(120);
    }

    window.addEventListener("resize", () => refreshMapSize(120));
    window.addEventListener("orientationchange", () => refreshMapSize(260));
    window.addEventListener("load", () => refreshMapSize(160));

    renderDay(0);
  </script>
</body>
</html>
