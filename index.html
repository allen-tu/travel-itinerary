  <style>
    :root {
      color-scheme: light;
      --ink: #20252a;
      --muted: #637078;
      --paper: #fbfaf7;
      --surface: #ffffff;
      --line: #dfd6c8;
      --accent: #184a59;
      --gold: #a77a3b;
      --sage: #71816d;
      --terracotta: #b36a4c;
      --blue: #396f8f;
      --plum: #6f5878;
      --radius: 8px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      color: var(--ink);
      background: var(--paper);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", sans-serif;
      letter-spacing: 0;
    }

    a { color: var(--accent); }

    .app {
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto auto 1fr;
    }

    header {
      padding: 20px 18px 14px;
      background: linear-gradient(180deg, #fffaf0 0%, #fbfaf7 100%);
      border-bottom: 1px solid var(--line);
    }

    .kicker {
      margin: 0 0 6px;
      color: var(--gold);
      font-size: 12px;
      font-weight: 750;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      color: var(--accent);
      font-size: clamp(26px, 7vw, 42px);
      line-height: 1.05;
    }

    .subtitle {
      max-width: 920px;
      margin: 10px 0 0;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.55;
    }

    .day-tabs {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding: 12px 12px;
      background: var(--surface);
      border-bottom: 1px solid var(--line);
      scrollbar-width: thin;
    }

    .day-tab {
      min-width: 112px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
      color: var(--ink);
      padding: 10px 11px;
      text-align: left;
      cursor: pointer;
    }

    .day-tab:focus-visible {
      outline: 3px solid rgba(24, 74, 89, 0.25);
      outline-offset: 2px;
    }

    .day-tab strong {
      display: block;
      font-size: 13px;
      line-height: 1.2;
    }

    .day-tab span {
      display: block;
      margin-top: 3px;
      color: var(--muted);
      font-size: 11px;
      line-height: 1.25;
    }

    .day-tab[aria-selected="true"] {
      border-color: var(--accent);
      background: #edf5f4;
      box-shadow: inset 0 0 0 1px var(--accent);
    }

    main {
      display: grid;
      grid-template-columns: minmax(320px, 420px) 1fr;
      min-height: 0;
    }

    .panel {
      min-height: 0;
      overflow: auto;
      background: var(--surface);
      border-right: 1px solid var(--line);
    }

    .panel-inner { padding: 16px; }

    .day-title {
      margin: 0 0 8px;
      font-size: 20px;
      color: var(--accent);
      line-height: 1.25;
    }

    .meta-grid {
      display: grid;
      gap: 8px;
      margin: 12px 0;
    }

    .meta {
      border: 1px solid #eadfce;
      border-radius: var(--radius);
      padding: 10px;
      background: #fffdf8;
    }

    .meta b {
      display: block;
      color: var(--gold);
      font-size: 12px;
      margin-bottom: 4px;
    }

    .meta span {
      color: var(--ink);
      font-size: 13px;
      line-height: 1.45;
    }

    .timeline {
      list-style: none;
      padding: 0;
      margin: 14px 0 0;
    }

    .stop {
      display: grid;
      grid-template-columns: 36px 1fr;
      gap: 10px;
      padding: 12px 0;
      border-top: 1px solid #eee7dc;
      cursor: pointer;
      border-radius: var(--radius);
      transition: background 160ms ease, box-shadow 160ms ease, transform 160ms ease;
    }

    .stop:hover {
      background: #fffaf0;
      box-shadow: inset 3px 0 0 var(--gold);
    }

    .stop:focus-visible {
      outline: 3px solid rgba(24, 74, 89, 0.25);
      outline-offset: 2px;
    }

    .stop.is-active {
      background: #edf5f4;
      box-shadow: inset 3px 0 0 var(--accent);
    }

    .num {
      width: 30px;
      height: 30px;
      display: inline-grid;
      place-items: center;
      border-radius: 50%;
      color: #fff;
      font-weight: 800;
      font-size: 13px;
      margin-top: 2px;
      pointer-events: none;
    }

    .stop h3 {
      margin: 0;
      font-size: 15px;
      line-height: 1.28;
    }

    .stop .en {
      display: block;
      margin-top: 2px;
      color: var(--muted);
      font-size: 12px;
    }

    .stop p {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }

      padding: 7px 9px;
      background: #f7faf8;
      color: #415057;
      font-size: 12px;
      line-height: 1.45;
    }

    .transit b {
      color: var(--accent);
      font-size: 11px;
      letter-spacing: 0;
    }

      border: 1px solid #e3d8c8;
      border-radius: 999px;
      padding: 4px 8px;
      color: var(--ink);
      background: #fff;
      font-size: 12px;
    }

    .map-wrap {
      min-height: 0;
      position: relative;
      background: #e9eee8;
    }

    #map {
      position: absolute;
      inset: 0;
      min-height: 520px;
    }

    .map-note {
      position: absolute;
      left: 14px;
      bottom: 14px;
      z-index: 450;
      max-width: min(380px, calc(100% - 28px));
      border: 1px solid rgba(24, 74, 89, 0.2);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.94);
      padding: 10px 12px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
      backdrop-filter: blur(8px);
    }

    .locate-btn {
      width: 30px;
      height: 30px;
      display: grid;
      place-items: center;
      border: 2px solid rgba(255, 255, 255, 0.96);
      border-radius: 50%;
      background: #c9403a;
      color: #fff;
      padding: 0;
      font: inherit;
      font-size: 0;
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.25);
    }

    .locate-btn::before {
      content: "";
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #fff;
      box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.28);
    }

    .locate-btn:disabled {
      cursor: progress;
      opacity: 0.68;
    }

    .user-marker {
      width: 24px;
      height: 24px;
      border: 3px solid #fff;
      border-radius: 50%;
      background: #c9403a;
      box-shadow: 0 0 0 4px rgba(201, 64, 58, 0.2), 0 4px 12px rgba(0, 0, 0, 0.28);
    }

    .leaflet-popup-content {
      margin: 12px 14px;
      min-width: 210px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", "PingFang TC", sans-serif;

    .popup-title {
      margin: 0 0 3px;
      color: var(--accent);
      font-weight: 800;
      font-size: 15px;
    }

    .popup-line {
      margin: 4px 0 0;
      color: #4e5a61;
      font-size: 12px;
      line-height: 1.4;
    }

    .route-marker {
      width: 30px;
      height: 30px;
      display: grid;
      place-items: center;
      border: 2px solid #fff;
      border-radius: 50%;
      color: #fff;
      font-size: 13px;
      font-weight: 850;
      box-shadow: 0 2px 9px rgba(0, 0, 0, 0.28);

    .alt-marker {

      height: 22px;

      place-items: center;
      border: 2px solid #fff;
      border-radius: 50%;
      background: #6d7276;
      color: #fff;
      font-size: 11px;
      font-weight: 800;
      box-shadow: 0 2px 7px rgba(0, 0, 0, 0.24);
    }

    .extra-marker {
      width: 24px;
      height: 24px;
      display: grid;
      place-items: center;
      border: 2px solid #fff;
      border-radius: 50%;
      background: var(--gold);
      color: #fff;
      font-size: 11px;
      font-weight: 850;
      box-shadow: 0 2px 7px rgba(0, 0, 0, 0.24);

    .suggested-marker {

      height: 26px;
      display: grid;
      place-items: center;
      border: 2px solid #fff;
      border-radius: 50%;
      background: var(--plum);
      color: #fff;
      font-size: 11px;
      font-weight: 850;
      box-shadow: 0 2px 7px rgba(0, 0, 0, 0.24);

      height: 22px;
      display: grid;
      place-items: center;
      border: 2px solid #fff;
      border-radius: 6px;
      background: #2f6583;
      color: #fff;
      font-size: 10px;
      font-weight: 850;
      letter-spacing: 0;
      box-shadow: 0 2px 7px rgba(0, 0, 0, 0.24);
    }

    .legend {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 6px;
      margin-top: 10px;
    }

    .tool-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
    }

    .toggle-btn {
      border: 1px solid #cbd9df;
      border-radius: var(--radius);
      background: #f6fbfd;
      color: var(--accent);
      padding: 8px 10px;
      font: inherit;
      font-size: 12px;
      font-weight: 800;
      cursor: pointer;
    }

    .toggle-btn[aria-pressed="true"] {
      border-color: #2f6583;
      background: #e8f3f7;
      box-shadow: inset 0 0 0 1px #2f6583;
    }

    .toggle-btn:focus-visible {
      outline: 3px solid rgba(47, 101, 131, 0.25);
      outline-offset: 2px;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 7px;
      color: var(--muted);
      font-size: 12px;
    }

    .pass-section {
      margin: 0 0 14px;
      border: 1px solid #eadfce;
      border-radius: var(--radius);
      background: #fffdf8;
      overflow: hidden;
    }

    .pass-section summary {
      cursor: pointer;
      padding: 11px 12px;
      color: var(--accent);
      font-size: 13px;
      font-weight: 800;
      list-style-position: inside;
    }

    .pass-grid {
      display: grid;
      gap: 8px;
      padding: 0 12px 12px;
    }

    .pass-card {
      border-top: 1px solid #eee7dc;
      padding-top: 9px;
    }

    .pass-card b {
      display: block;
      color: var(--gold);
      font-size: 12px;
      margin-bottom: 3px;
    }

    .pass-card span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }

    .swatch {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      border: 2px solid #fff;
      box-shadow: 0 0 0 1px #d7cbbd;
      flex: 0 0 auto;
    }

    @media (max-width: 840px) {
      .app { grid-template-rows: auto auto auto; }
      header { padding: 18px 15px 12px; }
      main {
        display: flex;
        flex-direction: column-reverse;
      }
      .panel {
        border-right: 0;
        border-top: 1px solid var(--line);
        max-height: none;
      }
      .map-wrap {
        height: 58vh;
        min-height: 420px;
      }
      #map { min-height: 420px; }
      .map-note { display: none; }
      .panel-inner { padding: 14px; }
      .day-tabs { padding: 10px; }
    }
  </style>
</head>

      const container = L.DomUtil.create("div", "leaflet-bar");

      locateButton.title = "顯示我的位置";
      locateButton.setAttribute("aria-label", "顯示我的位置");
      L.DomEvent.disableClickPropagation(container);
      L.DomEvent.on(locateButton, "click", (event) => {
        L.DomEvent.stop(event);
        locateUser();
      });
      return container;

    locateControl.addTo(map);

    let routeLayer = L.layerGroup().addTo(map);
    let wcLayer = L.layerGroup().addTo(map);
    let userLocationLayer = L.layerGroup().addTo(map);
    let activeDayIndex = 0;
    let activeRouteMarkers = [];
    let wcVisible = false;
    let latestUserLocation = null;

    function refreshMapSize(delay = 80) {
      window.setTimeout(() => {
        map.invalidateSize({ animate: false });
        const day = days[activeDayIndex];
        if (!day) return;
        const points = day.route.map((stop) => [stop.lat, stop.lng]);
        const altPoints = day.alternatives.map((stop) => [stop.lat, stop.lng]);
        const extraPoints = (day.extras || []).map((stop) => [stop.lat, stop.lng]);
        const suggestedPoints = (day.suggested || []).map((stop) => [stop.lat, stop.lng]);
        const wcPoints = (day.wc || []).map((stop) => [stop.lat, stop.lng]);
        const bounds = L.latLngBounds(points.concat(altPoints, extraPoints, suggestedPoints, wcPoints));
        map.fitBounds(bounds, { padding: [34, 34], maxZoom: 14 });
      }, delay);
    }

    function markerIcon(number, color, isAlt = false) {
      const cls = isAlt ? "alt-marker" : "route-marker";
      const text = isAlt ? "備" : number;
      const size = isAlt ? [22, 22] : [30, 30];
      return L.divIcon({
        className: "",
        html: `<div class="${cls}" style="background:${color}">${text}</div>`,
        iconSize: size,
        iconAnchor: [size[0] / 2, size[1] / 2],
        popupAnchor: [0, -size[1] / 2]
      });
    }

    function popupHtml(stop, prefix = "") {
      return `
        <p class="popup-title">${prefix}${stop.zh}</p>
        <p class="popup-line">${stop.en}</p>
        ${stop.address ? `<p class="popup-line">地址：${stop.address}</p>` : ""}
        ${stop.time ? `<p class="popup-line">時間：${stop.time}</p>` : ""}
        ${stop.transit ? `<p class="popup-line"><b>交通：</b>${stop.transit}</p>` : ""}
        <p class="popup-line">${stop.note}</p>
      `;
    }

    function renderTabs(activeIndex) {
      tabs.innerHTML = "";
      days.forEach((day, index) => {
        const button = document.createElement("button");
        button.className = "day-tab";
        button.type = "button";
        button.setAttribute("aria-selected", index === activeIndex ? "true" : "false");
        button.innerHTML = `<strong>${day.city ? day.city + "｜" : ""}${day.label}｜${day.date}</strong><span>${day.title}</span>`;
        button.addEventListener("click", () => renderDay(index));
        tabs.appendChild(button);
      });
    }

    function passGuideFor(day) {
      const city = (day.city || "").split("→")[0];
      if (city.includes("辛特拉")) return passGuides["辛特拉＋羅卡角"];
      if (city.includes("巴塞隆納")) return passGuides["巴塞隆納"];
      if (city.includes("馬德里")) return passGuides["馬德里"];
      if (city.includes("波多")) return passGuides["波多"];
      if (city.includes("里斯本")) return passGuides["里斯本"];
      return null;
    }

    function renderPassGuide(day) {
      const guide = passGuideFor(day);
      if (!guide) return "";
      return `
        <details class="pass-section" open>
          <summary>城市交通票建議</summary>
          <div class="pass-grid">
            ${guide.map((item) => `
              <div class="pass-card">
                <b>${item.title}</b>
                <span>${item.detail}</span>
              </div>
            `).join("")}
          </div>
        </details>
      `;
    }

        </div>
        <div class="legend">
          <div class="legend-item"><span class="swatch" style="background:${color}"></span>當日主要停留點</div>
          <div class="legend-item"><span class="swatch" style="background:#6d7276"></span>餐廳/雨天備案</div>
          ${day.extras ? `<div class="legend-item"><span class="swatch" style="background:#a77a3b"></span>順路餐廳/伴手禮</div>` : ""}
          ${day.suggested ? `<div class="legend-item"><span class="swatch" style="background:#6f5878"></span>值得補充景點</div>` : ""}
          ${day.wc ? `<div class="legend-item"><span class="swatch" style="background:#2f6583; border-radius:4px"></span>WC 圖層可切換</div>` : ""}
        </div>
        ${day.wc ? `
          <div class="tool-row">
            <button class="toggle-btn" type="button" id="wc-toggle" aria-pressed="false">顯示今日 WC（${day.wc.length}）</button>
          </div>
        ` : ""}
        <ol class="timeline">
          ${day.route.map((stop, index) => `
            <li class="stop" tabindex="0" role="button" data-stop-index="${index}" aria-label="在地圖上查看 ${stop.zh}">
              <span class="num" style="background:${color}">${index + 1}</span>
              <div>
                <h3>${stop.time}　${stop.zh}<span class="en">${stop.en}</span></h3>
                <p>${stop.note}</p>
                ${stop.transit ? `<div class="transit"><b>推薦交通</b><br>${stop.transit}</div>` : ""}
                <div class="chips">
                  <span class="chip">${stop.address}</span>
                  <span class="chip">地圖編號 ${index + 1}</span>
                </div>
              </div>
            </li>
          `).join("")}
        </ol>
        ${day.extras ? `
          <div class="meta-grid">
            <div class="meta"><b>順路加標</b><span>${day.extras.map((stop) => `${stop.zh}：${stop.note}`).join("　／　")}</span></div>
          </div>
        ` : ""}
        ${day.suggested ? `
          <div class="meta-grid">
            <div class="meta"><b>值得補充景點</b><span>${day.suggested.map((stop) => `${stop.zh}：${stop.note}`).join("　／　")}</span></div>
          </div>
        ` : ""}
        ${day.wc ? `
          <div class="meta-grid">
            <div class="meta"><b>可靠洗手間</b><span>${day.wc.map((stop) => `${stop.zh}（${stop.access}｜${stop.reliability}）：${stop.note}`).join("　／　")}</span></div>
          </div>
        ` : ""}
      `;
      details.querySelectorAll(".stop[data-stop-index]").forEach((item) => {
        const stopIndex = Number(item.dataset.stopIndex);
        item.addEventListener("click", () => focusStop(stopIndex));
        item.addEventListener("keydown", (event) => {
          if (event.key === "Enter" || event.key === " ") {
            event.preventDefault();
            focusStop(stopIndex);
          }
        });
      });
      const wcToggle = details.querySelector("#wc-toggle");
      if (wcToggle) {
        wcToggle.addEventListener("click", () => toggleWcLayer());
      }
    }

    function setActiveStop(stopIndex) {
      details.querySelectorAll(".stop").forEach((item) => {
        item.classList.toggle("is-active", Number(item.dataset.stopIndex) === stopIndex);
      });
    }

    function updateWcToggle() {
      const button = details.querySelector("#wc-toggle");
      const day = days[activeDayIndex];
      if (!button || !day?.wc) return;
      button.setAttribute("aria-pressed", wcVisible ? "true" : "false");
      button.textContent = wcVisible ? `隱藏今日 WC（${day.wc.length}）` : `顯示今日 WC（${day.wc.length}）`;
    }

    function renderWcLayer(day) {
      wcLayer.clearLayers();
      if (!wcVisible || !day?.wc) {
        updateWcToggle();
        return;
      }
      day.wc.forEach((stop) => {
        L.marker([stop.lat, stop.lng], {
          icon: L.divIcon({
            className: "",
            html: `<div class="wc-marker">WC</div>`,
            iconSize: [28, 22],
            iconAnchor: [14, 11],
            popupAnchor: [0, -11]
          }),
          zIndexOffset: 420
        })
          .bindPopup(`
            <p class="popup-title">WC：${stop.zh}</p>
            <p class="popup-line">${stop.en}</p>
            <p class="popup-line">類型：${stop.type}</p>
            <p class="popup-line">使用：${stop.access}</p>
            <p class="popup-line">可靠度：${stop.reliability}</p>
            <p class="popup-line">${stop.note}</p>
          `)
          .addTo(wcLayer);
      });
      updateWcToggle();
    }

    function toggleWcLayer() {
      wcVisible = !wcVisible;
      renderWcLayer(days[activeDayIndex]);
    }

    function setLocateStatus(message) {
      if (locateButton) locateButton.title = message;
    }

    function renderUserLocation(position) {
      const { latitude, longitude, accuracy } = position.coords;
      latestUserLocation = [latitude, longitude];
      userLocationLayer.clearLayers();
      L.circle(latestUserLocation, {
        radius: Math.min(Math.max(accuracy || 40, 25), 250),
        color: "#1f8a70",
        weight: 1,
        opacity: 0.7,
        fillColor: "#1f8a70",
        fillOpacity: 0.12
      }).addTo(userLocationLayer);
      L.marker(latestUserLocation, {
        icon: L.divIcon({
          className: "",
          html: '<div class="user-marker"></div>',
          iconSize: [24, 24],
          iconAnchor: [12, 12],
          popupAnchor: [0, -12]
        }),
        zIndexOffset: 1500
      })
        .bindPopup(`
          <p class="popup-title">我的位置</p>
          <p class="popup-line">定位精度約 ${Math.round(accuracy || 0)} 公尺</p>
        `)
        .addTo(userLocationLayer)
        .openPopup();
      map.flyTo(latestUserLocation, Math.max(map.getZoom(), 15), { duration: 0.65 });
      setLocateStatus(`已定位，精度約 ${Math.round(accuracy || 0)}m`);
    }

    function locateUser() {
      if (!navigator.geolocation) {
        setLocateStatus("此瀏覽器不支援定位");
        return;
      }
      locateButton.disabled = true;
      setLocateStatus("定位中…");
      navigator.geolocation.getCurrentPosition(
        (position) => {
          locateButton.disabled = false;
          renderUserLocation(position);
        },
        (error) => {
          locateButton.disabled = false;
          const messages = {
            1: "定位被拒絕，請允許位置權限",
            2: "目前無法取得位置",
            3: "定位逾時，請再試一次"
          };
          setLocateStatus(messages[error.code] || "定位失敗，請再試一次");
        },
        { enableHighAccuracy: true, timeout: 12000, maximumAge: 60000 }
      );
    }

    function focusStop(stopIndex) {
      const day = days[activeDayIndex];
      const stop = day?.route?.[stopIndex];
      const marker = activeRouteMarkers[stopIndex];
      if (!stop || !marker) return;
      setActiveStop(stopIndex);
      const targetZoom = Math.max(map.getZoom(), 15);
      map.flyTo([stop.lat, stop.lng], targetZoom, { duration: 0.65 });
      window.setTimeout(() => marker.openPopup(), 680);
    }

    function renderDay(index) {
      activeDayIndex = index;
      const day = days[index];
      const color = dayColors[index % dayColors.length];
      wcVisible = false;
      renderTabs(index);
      renderDetails(day, color);
      routeLayer.clearLayers();
      wcLayer.clearLayers();
      activeRouteMarkers = [];

      const points = day.route.map((stop) => [stop.lat, stop.lng]);
      L.polyline(points, {
        color,
        weight: 4,
        opacity: 0.82,
        lineJoin: "round"
      }).addTo(routeLayer);

      day.route.forEach((stop, stopIndex) => {
        const marker = L.marker([stop.lat, stop.lng], { icon: markerIcon(stopIndex + 1, color), zIndexOffset: 1000 })
          .bindPopup(popupHtml(stop))
          .addTo(routeLayer);
        marker.on("click", () => setActiveStop(stopIndex));
        activeRouteMarkers[stopIndex] = marker;
      });

      day.alternatives.forEach((stop) => {
        L.marker([stop.lat, stop.lng], { icon: markerIcon("備", "#6d7276", true), zIndexOffset: 100 })
          .bindPopup(popupHtml(stop, "備案："))
          .addTo(routeLayer);
      });

      (day.extras || []).forEach((stop) => {
        L.marker([stop.lat, stop.lng], {
          icon: L.divIcon({
            className: "",
            html: `<div class="extra-marker">順</div>`,
            iconSize: [24, 24],
            iconAnchor: [12, 12],
            popupAnchor: [0, -12]
          }),
          zIndexOffset: 500
        })
          .bindPopup(popupHtml(stop, "順路："))
          .addTo(routeLayer);
      });

      (day.suggested || []).forEach((stop) => {
        L.marker([stop.lat, stop.lng], {
          icon: L.divIcon({
            className: "",
            html: `<div class="suggested-marker">推</div>`,
            iconSize: [26, 26],
            iconAnchor: [13, 13],
            popupAnchor: [0, -13]
          }),
          zIndexOffset: 450
        })
          .bindPopup(popupHtml(stop, "補充："))
          .addTo(routeLayer);
      });

      const altPoints = day.alternatives.map((stop) => [stop.lat, stop.lng]);
      const extraPoints = (day.extras || []).map((stop) => [stop.lat, stop.lng]);
      const suggestedPoints = (day.suggested || []).map((stop) => [stop.lat, stop.lng]);
      const wcPoints = (day.wc || []).map((stop) => [stop.lat, stop.lng]);
      const bounds = L.latLngBounds(points.concat(altPoints, extraPoints, suggestedPoints, wcPoints));
      map.fitBounds(bounds, { padding: [34, 34], maxZoom: 14 });
      renderWcLayer(day);
      refreshMapSize(120);
    }

    window.addEventListener("resize", () => refreshMapSize(120));
    window.addEventListener("orientationchange", () => refreshMapSize(260));
    window.addEventListener("load", () => refreshMapSize(160));
    if (locateButton) locateButton.addEventListener("click", locateUser);

    renderDay(0);
  </script>
</body>
</html>
